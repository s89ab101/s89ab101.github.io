<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="記帳本"/>
<meta name="theme-color" content="#0f7a5a"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.svg"/>
<title>記帳本 · 台灣</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --teal:       #0f7a5a;
  --teal-mid:   #1D9E75;
  --teal-light: #d0f0e5;
  --teal-pale:  #f0fbf7;
  --coral:      #c94c28;
  --coral-light:#fce9e3;
  --amber:      #b06a0e;
  --amber-light:#fef0d8;
  --blue:       #1a5fa0;
  --blue-light: #e2edf9;
  --red:        #9b2626;
  --red-light:  #fbeaea;
  --gray:       #7a7872;
  --gray-light: #f3f2ef;
  --purple:     #4e44ad;
  --purple-light:#eeedfd;
  --green:      #3a6b11;
  --text:       #1a1a18;
  --text2:      #6b6a66;
  --text3:      #a0a09c;
  --bg:         #ffffff;
  --bg2:        #f6f5f2;
  --bg3:        #eeedea;
  --border:     rgba(0,0,0,0.08);
  --border2:    rgba(0,0,0,0.14);
  --shadow:     0 2px 12px rgba(0,0,0,0.08);
  --r-sm:       10px;
  --r-md:       14px;
  --r-lg:       20px;
  --r-xl:       28px;
  --safe-top:   env(safe-area-inset-top, 44px);
  --safe-bot:   env(safe-area-inset-bottom, 34px);
  --safe-left:  env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --teal:       #2fba8c;
    --teal-mid:   #2fba8c;
    --teal-light: #0d3d2a;
    --teal-pale:  #071f16;
    --coral:      #e06040;
    --coral-light:#3a1a10;
    --amber:      #d4860e;
    --amber-light:#352008;
    --blue:       #4d92d4;
    --blue-light: #0d2540;
    --red:        #d44444;
    --red-light:  #2d0c0c;
    --gray:       #8c8b87;
    --gray-light: #28282a;
    --purple:     #8077dd;
    --purple-light:#1a182e;
    --text:       #f0efec;
    --text2:      #a8a7a3;
    --text3:      #6e6d6a;
    --bg:         #1c1c1e;
    --bg2:        #252527;
    --bg3:        #2f2f32;
    --border:     rgba(255,255,255,0.08);
    --border2:    rgba(255,255,255,0.14);
    --shadow:     0 2px 12px rgba(0,0,0,0.4);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg2);}
body{font-family:'Noto Sans TC',sans-serif;color:var(--text);overscroll-behavior:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input{font-family:inherit;}

/* APP SHELL */
#app{width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg2);}
.statusbar{height:var(--safe-top);background:var(--bg);flex-shrink:0;}

/* SCREENS */
#screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg2);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);will-change:transform;}
.screen.active{transform:translateX(0);}
.screen.behind{transform:translateX(-30%);}

/* NAVBAR */
.navbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.navbar-title{font-size:17px;font-weight:700;color:var(--text);}
.nav-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:20px;}

/* TABS */
.tabbar{background:var(--bg);border-top:0.5px solid var(--border);display:flex;padding-bottom:var(--safe-bot);flex-shrink:0;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 4px;font-size:10px;font-weight:500;color:var(--text3);transition:color .15s;}
.tab-btn.active{color:var(--teal);}
.tab-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.tab-icon svg{width:22px;height:22px;}

/* PAGE CONTENT */
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.page-content{padding:0 0 20px;}

/* HEADER CARD */
.header-card{background:var(--bg);margin:12px 16px;border-radius:var(--r-lg);padding:16px 18px;border:0.5px solid var(--border);}
.header-month-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.month-nav-group{display:flex;align-items:center;gap:10px;}
.month-nav-btn{width:32px;height:32px;background:var(--bg2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);border:0.5px solid var(--border);}
.month-text{font-size:15px;font-weight:700;color:var(--text);}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.sum-item{background:var(--bg2);border-radius:var(--r-md);padding:10px 10px;}
.sum-label{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500;}
.sum-value{font-size:15px;font-weight:700;}
.sum-value.exp{color:var(--coral);}
.sum-value.inc{color:var(--teal);}
.sum-value.bal{color:var(--text);}

/* SECTION */
.section-header{padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;}
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}

/* TX LIST */
.tx-group{background:var(--bg);border-radius:var(--r-md);margin:0 16px 10px;border:0.5px solid var(--border);overflow:hidden;}
.tx-date-row{padding:8px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tx-date-text{font-size:12px;font-weight:600;color:var(--text2);}
.tx-date-sum{font-size:11px;color:var(--text3);}
.tx-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:0.5px solid var(--border);active:background:var(--bg2);}
.tx-item:last-child{border-bottom:none;}
.tx-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-cat{font-size:11px;color:var(--text3);margin-top:1px;}
.tx-amount{font-size:15px;font-weight:700;white-space:nowrap;}
.tx-amount.neg{color:var(--coral);}
.tx-amount.pos{color:var(--teal);}

/* FAB */
.fab{position:fixed;bottom:calc(var(--safe-bot) + 64px);right:20px;width:56px;height:56px;border-radius:50%;background:var(--teal);color:white;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(15,122,90,.45);transition:transform .15s,opacity .15s;z-index:50;}
.fab:active{transform:scale(.93);}
.fab.hidden{opacity:0;pointer-events:none;transform:scale(.8);}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;}
.empty-emoji{font-size:48px;opacity:.4;}
.empty-text{font-size:14px;color:var(--text3);text-align:center;line-height:1.6;}

/* BOTTOM SHEET MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-radius:var(--r-xl) var(--r-xl) 0 0;z-index:101;padding:0 18px calc(var(--safe-bot) + 16px);transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 14px;}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px;}

.type-toggle{display:flex;background:var(--bg2);border-radius:var(--r-md);padding:3px;gap:3px;margin-bottom:16px;}
.type-btn{flex:1;padding:8px;text-align:center;font-size:14px;font-weight:600;border-radius:var(--r-sm);color:var(--text3);transition:all .18s;}
.type-btn.active.exp{background:var(--coral-light);color:var(--coral);}
.type-btn.active.inc{background:var(--teal-light);color:var(--teal);}

.amount-row{display:flex;align-items:baseline;gap:6px;padding:8px 0 12px;border-bottom:1.5px solid var(--border2);margin-bottom:16px;}
.amount-prefix{font-size:20px;font-weight:700;color:var(--text2);}
.amount-input{flex:1;font-size:34px;font-weight:700;border:none;background:transparent;color:var(--text);outline:none;width:100%;}
.amount-input::placeholder{color:var(--text3);}

.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.03em;}
.text-input{width:100%;font-size:15px;border:0.5px solid var(--border2);background:var(--bg2);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);outline:none;margin-bottom:14px;}
.text-input:focus{border-color:var(--teal);}

.cats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:var(--r-md);border:0.5px solid var(--border);background:var(--bg2);font-size:11px;font-weight:500;color:var(--text2);transition:all .15s;}
.cat-btn.sel{border-color:var(--teal);background:var(--teal-light);color:var(--teal);}
.cat-emoji-large{font-size:20px;}

.date-input-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.date-input{flex:1;font-size:14px;border:0.5px solid var(--border2);background:var(--bg2);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);outline:none;}
.date-input:focus{border-color:var(--teal);}

.submit-btn{width:100%;padding:16px;background:var(--teal);color:white;border-radius:var(--r-lg);font-size:16px;font-weight:700;transition:opacity .15s,transform .15s;letter-spacing:.02em;}
.submit-btn:active{transform:scale(.98);opacity:.9;}

/* CHART PAGE */
.chart-card{background:var(--bg);border-radius:var(--r-lg);margin:12px 16px;border:0.5px solid var(--border);padding:16px;}
.chart-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em;}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:90px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px;height:100%;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .4s;}
.bar-month{font-size:9px;color:var(--text3);}

.donut-row{display:flex;align-items:center;gap:16px;}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text);}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.legend-pct{margin-left:auto;font-size:11px;color:var(--text3);}

.progress-row{display:flex;flex-direction:column;gap:10px;}
.prog-item{display:flex;flex-direction:column;gap:5px;}
.prog-header{display:flex;align-items:center;justify-content:space-between;}
.prog-cat{font-size:13px;font-weight:500;color:var(--text);}
.prog-amt{font-size:12px;color:var(--text3);}
.prog-bar-bg{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .5s;}

/* BUDGET PAGE */
.budget-card{background:var(--bg);border-radius:var(--r-lg);margin:0 16px 10px;border:0.5px solid var(--border);padding:15px 16px;}
.budget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.budget-cat-name{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--text);}
.budget-amounts{font-size:12px;color:var(--text3);}
.budget-bar-bg{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.budget-bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.budget-note{font-size:11px;font-weight:500;}

/* SETTINGS PAGE */
.settings-section{background:var(--bg);border-radius:var(--r-lg);margin:0 16px 12px;border:0.5px solid var(--border);overflow:hidden;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:14px;font-weight:500;color:var(--text);}
.settings-value{font-size:13px;color:var(--text2);font-weight:500;}
.settings-value.teal{color:var(--teal);}
.settings-value.red{color:var(--red);}
.toggle-switch{width:44px;height:26px;background:var(--teal);border-radius:13px;position:relative;transition:background .2s;}
.toggle-thumb{position:absolute;right:2px;top:2px;width:22px;height:22px;background:white;border-radius:50%;transition:transform .2s;}
.toggle-switch.off{background:var(--bg3);}
.toggle-switch.off .toggle-thumb{transform:translateX(-18px);}
.profile-hero{display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px;}
.avatar{width:76px;height:76px;border-radius:50%;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:10px;border:2px solid var(--teal);}
.profile-name{font-size:18px;font-weight:700;color:var(--text);}
.profile-sub{font-size:13px;color:var(--text3);margin-top:3px;}

/* Animations */
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.tx-group{animation:slideUp .3s ease forwards;}

/* Haptic feedback visual */
.tx-item:active{background:var(--bg2);}
.cat-btn:active{transform:scale(.94);}
</style>
</head>
<body>
<div id="app">
  <div class="statusbar"></div>

  <div id="screens">
    <!-- HOME -->
    <div class="screen active" id="screen-home">
      <div class="navbar">
        <span class="navbar-title">💰 記帳本</span>
        <button class="nav-btn" onclick="openSearch()" aria-label="搜尋">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="page-scroll" id="home-scroll">
        <div class="page-content">
          <div class="header-card">
            <div class="header-month-row">
              <div class="month-nav-group">
                <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
                <span class="month-text" id="month-label">2026年4月</span>
                <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
              </div>
              <button onclick="jumpToToday()" style="font-size:12px;color:var(--teal);font-weight:600;padding:4px 8px;background:var(--teal-light);border-radius:6px;">今天</button>
            </div>
            <div class="summary-grid">
              <div class="sum-item"><div class="sum-label">支出</div><div class="sum-value exp" id="sum-exp">NT$0</div></div>
              <div class="sum-item"><div class="sum-label">收入</div><div class="sum-value inc" id="sum-inc">NT$0</div></div>
              <div class="sum-item"><div class="sum-label">結餘</div><div class="sum-value bal" id="sum-bal">NT$0</div></div>
            </div>
          </div>
          <div id="tx-list-container"></div>
        </div>
      </div>
    </div>

    <!-- CHART -->
    <div class="screen" id="screen-chart">
      <div class="navbar"><span class="navbar-title">📊 統計報表</span></div>
      <div class="page-scroll"><div class="page-content" id="chart-content">
        <div class="chart-card">
          <div class="chart-title">近6個月支出</div>
          <div class="bar-chart" id="monthly-bars"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">本月支出分類</div>
          <div class="donut-row">
            <svg id="donut-svg" width="110" height="110" viewBox="0 0 110 110"></svg>
            <div class="donut-legend" id="donut-legend"></div>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-title">分類進度</div>
          <div class="progress-row" id="cat-progress"></div>
        </div>
      </div></div>
    </div>

    <!-- BUDGET -->
    <div class="screen" id="screen-budget">
      <div class="navbar">
        <span class="navbar-title">🎯 預算管理</span>
        <button class="nav-btn" onclick="editBudgetSheet()" style="font-size:13px;font-weight:600;color:var(--teal);width:auto;padding:0 4px;">編輯</button>
      </div>
      <div class="page-scroll"><div class="page-content">
        <div style="margin:12px 16px 0;font-size:12px;color:var(--text3);">追蹤每月各分類的花費狀況</div>
        <div style="height:10px;"></div>
        <div id="budget-list"></div>
      </div></div>
    </div>

    <!-- SETTINGS -->
    <div class="screen" id="screen-settings">
      <div class="navbar"><span class="navbar-title">⚙️ 設定</span></div>
      <div class="page-scroll"><div class="page-content">
        <div class="profile-hero">
          <div class="avatar">🐷</div>
          <div class="profile-name">我的帳本</div>
          <div class="profile-sub" id="profile-sub">載入中…</div>
        </div>
        <div class="section-header"><span class="section-title">偏好設定</span></div>
        <div class="settings-section">
          <div class="settings-row">
            <span class="settings-label">💱 貨幣單位</span>
            <select id="currency-sel" style="font-size:13px;font-weight:600;color:var(--teal);background:transparent;border:none;outline:none;">
              <option value="NT$">NT$（台幣）</option>
              <option value="USD">USD（美元）</option>
              <option value="JPY">JPY（日圓）</option>
              <option value="CNY">CNY（人民幣）</option>
            </select>
          </div>
          <div class="settings-row">
            <span class="settings-label">🔔 月末提醒</span>
            <div class="toggle-switch" id="notify-toggle" onclick="toggleNotify()"><div class="toggle-thumb"></div></div>
          </div>
          <div class="settings-row">
            <span class="settings-label">📅 週期起算日</span>
            <span class="settings-value">每月1日</span>
          </div>
        </div>
        <div class="section-header"><span class="section-title">資料管理</span></div>
        <div class="settings-section">
          <div class="settings-row" onclick="exportData()" style="cursor:pointer;">
            <span class="settings-label">📤 匯出CSV</span>
            <span class="settings-value teal">›</span>
          </div>
          <div class="settings-row" onclick="confirmClear()" style="cursor:pointer;">
            <span class="settings-label" style="color:var(--red);">🗑 清除所有資料</span>
            <span class="settings-value red">›</span>
          </div>
        </div>
        <div style="text-align:center;padding:20px;font-size:11px;color:var(--text3);">記帳本 v1.0 · 資料儲存於本機</div>
      </div></div>
    </div>
  </div><!-- /screens -->

  <!-- TAB BAR -->
  <div class="tabbar">
    <button class="tab-btn active" id="tab-home" onclick="switchTab('home')">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10L12 3l9 7v10h-5v-6H8v6H3z" stroke-linejoin="round"/></svg></div>
      首頁
    </button>
    <button class="tab-btn" id="tab-chart" onclick="switchTab('chart')">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg></div>
      統計
    </button>
    <button class="tab-btn" id="tab-budget" onclick="switchTab('budget')">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3" stroke-linecap="round"/></svg></div>
      預算
    </button>
    <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke-linecap="round"/></svg></div>
      設定
    </button>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openAddSheet()">+</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSheets()"></div>

<!-- ADD SHEET -->
<div class="sheet" id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">新增記錄</div>
  <div class="type-toggle">
    <button class="type-btn active exp" id="type-exp" onclick="setType('expense')">支出</button>
    <button class="type-btn inc" id="type-inc" onclick="setType('income')">收入</button>
  </div>
  <div class="amount-row">
    <span class="amount-prefix" id="currency-prefix">NT$</span>
    <input class="amount-input" type="number" id="inp-amount" placeholder="0" inputmode="decimal" min="0"/>
  </div>
  <div class="form-label">備註</div>
  <input class="text-input" type="text" id="inp-note" placeholder="例：午餐、悠遊卡儲值…" maxlength="25"/>
  <div class="form-label">分類</div>
  <div class="cats-grid" id="cats-grid"></div>
  <div class="form-label">日期</div>
  <div class="date-input-row">
    <input class="date-input" type="date" id="inp-date"/>
  </div>
  <button class="submit-btn" onclick="addTx()">確認新增</button>
</div>

<!-- BUDGET EDIT SHEET -->
<div class="sheet" id="budget-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">設定月預算</div>
  <div id="budget-edit-fields"></div>
  <button class="submit-btn" onclick="saveBudgets()">儲存預算</button>
</div>

<!-- TOAST -->
<div id="toast" style="position:fixed;bottom:calc(var(--safe-bot) + 80px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.85);color:white;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;"></div>

<script src="app.js"></script>
</body>
</html>
